---
- name: 1. 충돌방지를 위한 구버전 Docker 삭제
  apt:
    name:
      - docker
      - docker.io
      - docker-engine
      - containerd
      - runc
    state: absent
  ignore_errors: yes

- name: 2. 필수 패키지 설치
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: yes

- name: 3. Docker 공식 사이트의 GPG Key 추가
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: 4. Docker Repository 추가
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_lsb.codename }} stable"
    state: present

- name: 5. 최신 Docker 설치
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - python3-docker
    state: present
    update_cache: yes

- name: 6. Docker 서비스 시작
  service: 
    name: docker
    state: started
    enabled: yes

- name: 7. index.html 생성
  copy:
    dest: /tmp/zombie_index.html
    content:
      <h1>나는 좀비다</h1>
      <p>프로세스를 죽여도 다시 날아난다</p>

- name: 8. 좀비 Container 실행
  community.docker.docker_container:
    name: my-zombie-app
    image: nginx
    state: started
    restart_policy: always
    ports:
      - "8080:80"
    volumes:
      - "/tmp/zombie_index.html:/usr/share/nginx/html/index.html"
