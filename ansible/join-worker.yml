---
# step 1) 마스터에서 join 토큰 읽기
- name: Get K3s join token from master
  hosts: master
  become: yes
  gather_facts: no
  tasks:
    - name: Read node-token from master
      ansible.builtin.command: "cat {{ k3s_token_file }}"
      register: master_token
      changed_when: false

    - name: Set token on master host
      ansible.builtin.set_fact:
        k3s_master_token: "{{ master_token.stdout }}"

    # 마스터 endpoint는 "마스터 내부IP를 쓰는 게 안정적"
    # 인텐토리 /host_vars에 k3s_master_endpoint 또는 k3s_master_internal_ip가 있어야 함
    #- name: Set master endpoint fact (prefer internal ip variable)
    # ansible.builtin.set_fact:
    #   k3s_master_endpoint: "{{ hostvars[inventory_hostname].k3s_master_internal_ip | default(hostvars[inventory_hostname].ansible_host) }}"

# step 2) 새 워커를 클러스터에 join
- name: Join new workers to k3s
  hosts: worker
  become: yes
  gather_facts: no
  tasks:
    - name: Install k3s agent and join
      ansible.builtin.shell: |
        curl -sfL {{ k3s_install_url }} | \
        INSTALL_K3S_VERSION="{{ k3s_version }}" \
        K3S_URL="https://{{ groups['master'][0] }}:6443" \
        K3S_TOKEN="{{ hostvars[groups['master'][0]].k3s_master_token }}" \
        sh -s - agent
      args:
        creates: /etc/systemd/system/k3s-agent.service

    - name: Ensure k3s-agent is running
      ansible.builtin.systemd:
        name: k3s-agent
        state: started
        enabled: yes
